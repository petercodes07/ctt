upstream ctt_backend_upstream {
    server 127.0.0.1:9090;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=ctt_api_limit:10m rate=20r/s;

server {
    listen 80;
    server_name vibeshype.com www.vibeshype.com;
    root /var/www/html;
    index index.html;

    client_max_body_size 2m;
    proxy_read_timeout 300s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        limit_req zone=ctt_api_limit burst=40 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://ctt_backend_upstream;
    }

    location = /health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://ctt_backend_upstream/health;
    }

    location = /api/fetch-status {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://ctt_backend_upstream/api/fetch-status;
    }

    location = /fetch-songs {
        limit_req zone=ctt_api_limit burst=20 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://ctt_backend_upstream/fetch-songs;
    }

    location = /download/ctt.apk {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://ctt_backend_upstream/download/ctt.apk;
    }

    location ^~ /songs/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://ctt_backend_upstream;
    }
}
